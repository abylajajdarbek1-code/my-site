<!DOCTYPE html>
<html>
<head>
    <title>Security System</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .box {
            margin-top: 100px;
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input[type="file"] {
            margin: 15px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 Security System</h2>

    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file">
        <br>
        <button type="submit">Upload Face</button>
    </form>

</div>

</body>
</html>
